<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='root.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='base_post.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pages.css') }}">

    {% block head %}
    {% endblock %}
</head>

<body>
    <div class="pages-progress" role="progressbar"></div>

    <div class="pages-wrapper">
        <div class="pages-container">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="{{ url_for('static', filename='pages.js') }}" defer></script>
    
    {% block scripts %}
    {% endblock %}
</body>

</html>
